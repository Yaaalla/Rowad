<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-Rowad | Coming Soon</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0B1015;
            --bg-secondary: #0F161D;
            --accent: #D8B528;
            --accent-glow: rgba(216, 181, 40, 0.3);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients substituted for images */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(216, 181, 40, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(216, 181, 40, 0.03) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            background: rgba(15, 22, 29, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            background: var(--bg-main);
            box-shadow: 0 0 30px var(--accent-glow);
            transition: transform 0.5s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .text-accent {
            color: var(--accent);
        }

        p {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 48px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Countdown Styles */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .count-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            min-width: 100px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .count-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .count-number {
            display: block;
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
            font-variant-numeric: tabular-nums;
        }

        .count-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
        }

        /* Social Icons */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--accent);
            color: var(--bg-main);
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .countdown {
                gap: 10px;
            }
            .count-box {
                padding: 15px;
                min-width: 70px;
            }
            .count-number {
                font-size: 24px;
            }
            .count-label {
                font-size: 10px;
            }
        }

        /* RTL Support (Internal Arabic text) */
        [dir="rtl"] {
            font-family: 'Readex Pro', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="./logo.jpg" alt="AL-Rowad Logo">
        </div>

        <div class="content">
            <h1>Something <span class="text-accent">Big</span> is Coming</h1>
            <p>We're architecting the future. Our new platform will be live in:</p>

            <div class="countdown">
                <div class="count-box">
                    <span class="count-number" id="hours">24</span>
                    <span class="count-label">Hours</span>
                </div>
                <div class="count-box">
                    <span class="count-number" id="minutes">00</span>
                    <span class="count-label">Minutes</span>
                </div>
                <div class="count-box">
                    <span class="count-number" id="seconds">00</span>
                    <span class="count-label">Seconds</span>
                </div>
            </div>

         
        </div>
    </div>

    <script>
        // Set the countdown to 24 hours from now
        // If you want a fixed end date, you can set it here
        const COUNTDOWN_TIME = 24 * 60 * 60 * 1000; // 24 hours in ms
        
        // We Use localStorage to keep the countdown consistent if the user refreshes
        let endTime = localStorage.getItem('waiting_page_end_time');

        if (!endTime) {
            endTime = new Date().getTime() + COUNTDOWN_TIME;
            localStorage.setItem('waiting_page_end_time', endTime);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = endTime - now;

            if (distance < 0) {
                // Timer finished - reset or show message
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                // Optional: localStorage.removeItem('waiting_page_end_time');
                return;
            }

            const hours = Math.floor((distance / (1000 * 60 * 60)));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        // Update every second
        setInterval(updateCountdown, 1000);
        updateCountdown(); // Run immediately

        // Detect language for RTL (Optional refinement)
        if (navigator.language.startsWith('ar')) {
            // document.body.dir = "rtl";
            // You can add logic to translate text here if needed
        }
    </script>
</body>
</html>
